name: build-release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit Tests
        run: go test ./...

      - name: Readiness Check
        run: go run ./scripts/readiness-check

  package-release:
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Package Release Artifacts
        env:
          CODEX_MEM_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          CODEX_MEM_COMMIT: ${{ github.sha }}
          CODEX_MEM_BUILD_DATE: ${{ github.event.head_commit.timestamp || '' }}
        run: go run ./scripts/package-release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-mem-release-artifacts
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true



